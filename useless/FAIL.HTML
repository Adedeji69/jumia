<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #010e28;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .transaction {
    width: 100%;
    max-width: 600px;
    padding: 16px 0;
    border-bottom: 1px solid #e8e8e8;
  }
  .timestamp {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .icon-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }
  .circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #e03b2b;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .circle svg { color: #e03b2b; }
  .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #e0e0e0;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #555;
  }
  .info { display: flex; flex-direction: column; gap: 4px; }
  .title { font-size: 17px; font-weight: 700; color: #fff; }
  .status { font-size: 14px; font-weight: 600; color: #e03b2b; }
  .address { font-size: 12px; color: #999; margin-top: 2px; }
  .amount { font-size: 16px; color: #aaa; font-weight: 400; }
</style>
</head>
<body>

  <div class="transaction">
    <div class="timestamp">Mar 14 at 7:59 UTC </div>
    <div class="row">
      <div class="left">
        <div class="icon-wrap">
          <div class="circle">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="6" y1="6" x2="18" y2="18"/>
              <line x1="18" y1="6" x2="6" y2="18"/>
            </svg>
          </div>
          <div class="badge">!</div>
        </div>
        <div class="info">
          <span class="title">Send BDAG</span>
          <span class="address">0xEd7f0D18………38DbEB5744e5</span>
          <span class="status">Failed</span>
        </div>
      </div>
      <div class="amount">1230 BDAG</div>
    </div>
  </div>

</body>
</html>
